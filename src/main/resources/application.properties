spring.application.name=leave-helper

# =========================
# DataSource: PostgreSQL
# =========================
spring.datasource.url=jdbc:postgresql://freidrich-2025.pg.polardb.rds.aliyuncs.com:5432/postgres
spring.datasource.username=flyway_user
spring.datasource.password=Ocbc#2025
spring.datasource.driver-class-name=org.postgresql.Driver

# =========================
# JPA & Hibernate
# =========================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# =========================
# Logging
# =========================
logging.level.com.ocbc.ms.hrtools.security=TRACE
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.filter=TRACE

# =========================
# JWT Configuration
# =========================
app.jwt.secret=your-secret-key-here-change-this-in-production
# JWT expiration in milliseconds (24 hours)
app.jwt.expiration=86400000

# =========================
# Security Configuration
# =========================
spring.security.user.name=admin
spring.security.user.password=admin
spring.security.user.roles=ADMIN

# =========================
# Server Configuration
# =========================
server.port=8080
server.servlet.context-path=/api

# =========================
# Logging Configuration
# =========================
logging.level.org.springframework.security=INFO
logging.level.com.ocbc.ms.hrtools=DEBUG
